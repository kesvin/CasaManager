name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Check for secrets
        run: npm run check:secrets
      - name: Build
        run: npm run build
      - name: Optional analyze (if flag set)
        if: env.ANALYZE == 'true'
        run: npm run analyze
